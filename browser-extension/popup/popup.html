<!-- browser-extension/popup/popup.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px system-ui; width: 240px; padding: 12px; }
    button { display: block; width: 100%; margin: 6px 0; padding: 8px; cursor: pointer; }
    a.joblink { display: block; width: 100%; margin: 6px 0; padding: 8px; box-sizing: border-box;
      text-align: center; text-decoration: none; color: #fff; background: #2563eb; border-radius: 4px; }
    a.joblink:hover { background: #1d4ed8; }
    #greeting { font-weight: 600; }
    #email { color: #555; font-size: 12px; }
    .hidden { display: none; }
    /* Two-position Live/Local slider switch */
    .switch-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .switch-row .side { color: #999; transition: color .15s; }
    .switch-row .side.active-live { color: #2563eb; font-weight: 600; }
    .switch-row .side.active-local { color: #b45309; font-weight: 600; }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; margin: 0; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; margin: 0; }
    .switch .track { position: absolute; inset: 0; cursor: pointer; background: #2563eb;
      border-radius: 22px; transition: background .15s; }
    .switch .track::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px;
      bottom: 3px; background: #fff; border-radius: 50%; transition: transform .15s; }
    .switch input:checked + .track { background: #b45309; }
    .switch input:checked + .track::before { transform: translateX(18px); }
  </style>
</head>
<body>
  <div id="signedOut">
    <p>Sign in to send jobs to AutoApply:</p>
    <button id="loginGoogle">Sign in with Google</button>
    <button id="loginGithub">Sign in with GitHub</button>
    <p id="err" style="color:#b00;"></p>
  </div>
  <div id="signedIn" class="hidden">
    <p id="greeting"></p>
    <div id="serverToggle" class="hidden" style="margin:6px 0; padding:6px 0; border-top:1px solid #eee;">
      <p style="margin:0 0 4px; font-size:12px; color:#555;">Send jobs to:</p>
      <div class="switch-row">
        <span id="sideLive" class="side">Live</span>
        <label class="switch">
          <input type="checkbox" id="serverModeSwitch" />
          <span class="track"></span>
        </label>
        <span id="sideLocal" class="side">Local</span>
      </div>
    </div>
    <p>Ready to look at jobs?</p>
    <a class="joblink" href="https://www.linkedin.com/jobs/" target="_blank" rel="noopener">Browse LinkedIn jobs</a>
    <a class="joblink" href="https://www.indeed.com/jobs" target="_blank" rel="noopener">Browse Indeed jobs</a>
    <p id="email"></p>
    <button id="logout">Sign out</button>
  </div>
  <hr />
  <a class="joblink" href="https://autoapply.matthewbarlow.me" target="_blank" rel="noopener">Open AutoApply</a>
  <script src="../lib/browser_shim.js"></script>
  <script src="popup.js"></script>
</body>
</html>
