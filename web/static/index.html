<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Apply</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/images/apple-touch-icon.png" />
  <link rel="stylesheet" href="/static/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="dashboard()" x-init="init()">

<nav>
  <a class="brand" href="/">Auto Apply</a>
  <a href="/" class="nav-active">Dashboard</a>
  <a href="/config">Config</a>
  <a href="/setup">Setup</a>
  <a href="/help" class="nav-right">Help</a>
</nav>

<main>
  <div class="toolbar">
    <span x-text="sortedJobs.length + ' jobs'"></span>
  </div>

  <table class="job-table">
    <thead>
      <tr>
        <th>Title</th>
        <th>Company</th>
        <th class="sortable" @click="setSort('final_score')">
          Score <span x-show="sortField === 'final_score'" x-text="sortDir === 'desc' ? '▼' : '▲'"></span>
        </th>
        <th>Location</th>
        <th class="sortable" @click="setSort('salary')">
          Salary <span x-show="sortField === 'salary'" x-text="sortDir === 'desc' ? '▼' : '▲'"></span>
        </th>
        <th class="sortable" @click="setSort('state')">
          Status <span x-show="sortField === 'state'" x-text="sortDir === 'desc' ? '▼' : '▲'"></span>
        </th>
        <th class="sortable" @click="setSort('scraped_at')">
          Date <span x-show="sortField === 'scraped_at'" x-text="sortDir === 'desc' ? '▼' : '▲'"></span>
        </th>
      </tr>
    </thead>
    <tbody>
      <template x-for="job in sortedJobs" :key="job.job_key">
        <tr class="job-row" @click="selectJob(job)">
          <td x-text="job.title || '(no title)'"></td>
          <td x-text="job.company || ''"></td>
          <td><span :class="'score-badge ' + scoreClass(job.final_score)" x-text="pct(job.final_score)"></span></td>
          <td x-text="job.location || ''"></td>
          <td x-text="job.salary || ''"></td>
          <td><span :class="'status-badge ' + statusClass(job.state)" x-text="statusLabel(job.state)"></span></td>
          <td x-text="timeAgo(job.scraped_at)" style="white-space:nowrap;color:#6b7280;font-size:0.85em"></td>
        </tr>
      </template>
    </tbody>
  </table>

  <p class="empty-msg" x-show="sortedJobs.length === 0 && !loadError" x-text="'No jobs in database.'"></p>
  <p class="empty-msg error" x-show="loadError" x-text="loadError"></p>
</main>

<!-- Overlay backdrop -->
<div class="overlay-backdrop" x-show="selectedJob !== null" @click.self="closeOverlay()">
  <div class="overlay-panel" @keydown.escape.window="promptOverlay !== null ? (promptOverlay = null) : closeOverlay()">
    <template x-if="selectedJob">
      <div style="display:flex;flex-direction:column;height:100%">

        <!-- Fixed top: header, meta, action bar -->
        <div class="overlay-top">
          <div class="overlay-header">
            <h2>
              <span x-text="selectedJob.title || '(no title)'"></span>
              <span x-show="generating" style="display:inline-flex;align-items:center;margin-left:0.5rem;font-size:0.85rem;color:#888;font-weight:400;vertical-align:middle">
                <svg viewBox="0 0 20 20" width="14" height="14" style="margin-right:0.4em;flex-shrink:0;display:block">
                  <g>
                    <circle cx="10" cy="10" r="7" fill="none" stroke="#3a3a3a" stroke-width="2.5" stroke-dasharray="9.5 1.5"/>
                    <circle cx="10" cy="10" r="7" fill="none" stroke="#aaa" stroke-width="2.5" stroke-dasharray="9.5 34.5"/>
                    <animateTransform attributeName="transform" type="rotate"
                      values="-90 10 10;0 10 10;90 10 10;180 10 10"
                      dur="2s" calcMode="discrete" repeatCount="indefinite"/>
                  </g>
                </svg>
                <span x-text="generatingLabel"></span>
              </span>
            </h2>
            <span :class="'status-badge ' + statusClass(selectedJob.state)" x-text="statusLabel(selectedJob.state)"></span>
          </div>

          <div class="overlay-meta">
            <span x-text="selectedJob.company || ''"></span>
            <span :class="'score-badge ' + scoreClass(selectedJob.final_score)" x-text="pct(selectedJob.final_score)"></span>
            <span x-text="selectedJob.location || ''"></span>
            <span x-text="selectedJob.salary || ''"></span>
          </div>

          <!-- Action bar -->
          <div class="action-bar">

            <!-- Tab-specific actions (left) -->

            <!-- Overview -->
            <template x-if="activeTab === 'overview'">
              <button class="btn" @click="calculateScore()">Calculate Score</button>
            </template>

            <!-- Resume -->
            <template x-if="activeTab === 'resume'">
              <div style="display:contents">
                <button class="btn" @click="generateResumeMd()" :disabled="!!generating"
                  x-text="selectedJob.resume_md_exists ? 'Regenerate MD' : 'Generate MD'">
                </button>
                <button class="btn" @click="generateResumePdf()"
                  :disabled="!!generating || !selectedJob.resume_md_exists || !resumeHasTemplate"
                  :title="!resumeHasTemplate ? 'Assign a LaTeX template to the active Resume prompt in Config first' : ''"
                  x-text="selectedJob.resume_path ? 'Regenerate PDF' : 'Generate PDF'">
                </button>
                <button class="btn" x-show="selectedJob.resume_md_exists"
                  @click="viewPrompt('resume')" :disabled="!!generating">
                  View Prompt
                </button>
              </div>
            </template>

            <!-- Cover Letter -->
            <template x-if="activeTab === 'cover'">
              <div style="display:contents">
                <button class="btn" @click="generateCoverMd()" :disabled="!!generating"
                  x-text="selectedJob.cover_md_exists ? 'Regenerate MD' : 'Generate MD'">
                </button>
                <button class="btn" @click="generateCoverPdf()"
                  :disabled="!!generating || !selectedJob.cover_md_exists || !selectedJob.resume_path || !coverHasTemplate"
                  :title="!coverHasTemplate ? 'Assign a LaTeX template to the active Cover prompt in Config first' : !selectedJob.cover_md_exists ? 'Generate cover MD first' : !selectedJob.resume_path ? 'Generate resume PDF first' : ''"
                  x-text="selectedJob.cover_path ? 'Regenerate PDF' : 'Generate PDF'">
                </button>
                <button class="btn" x-show="selectedJob.cover_md_exists"
                  @click="viewPrompt('cover')" :disabled="!!generating">
                  View Prompt
                </button>
              </div>
            </template>

            <!-- Details -->
            <template x-if="activeTab === 'details'">
              <div style="display:contents">
                <button class="btn" @click="extractDescription()"
                  :disabled="!!generating || !extractionHasPrompt"
                  :title="!extractionHasPrompt ? 'Configure a Description Extraction Prompt in Config first' : ''">
                  Extract
                </button>
                <button class="btn" x-show="selectedJob.extraction_json_exists"
                  @click="viewPrompt('description')" :disabled="!!generating">
                  View Prompt
                </button>
              </div>
            </template>

            <!-- Spacer -->
            <div class="action-bar-spacer"></div>

            <!-- Persistent actions (right) -->
            <a class="btn" :href="selectedJob.url + '#aajob=' + selectedJob.job_key" target="_blank" rel="noopener noreferrer">View Posting</a>

            <select class="status-select" @change="setStatus($event.target.value)">
              <option value="draft" :selected="selectedJob.state === 'draft'">Draft</option>
              <option value="applied" :selected="selectedJob.state === 'applied'">Applied</option>
              <option value="in_contact" :selected="selectedJob.state === 'in_contact'">In Contact</option>
              <option value="rejected" :selected="selectedJob.state === 'rejected'">Rejected</option>
            </select>

            <template x-if="!deleteConfirm">
              <button class="btn btn-danger" @click.stop="deleteConfirm = true">Delete</button>
            </template>
            <template x-if="deleteConfirm">
              <button class="btn btn-danger-confirm" @click.stop="deleteJob()">Confirm Delete</button>
            </template>
          </div>
        </div>

        <!-- Body: sidebar + tab content -->
        <div class="overlay-body">

          <!-- Vertical tab sidebar -->
          <div class="overlay-tab-sidebar">
            <button class="overlay-tab-btn" :class="{ active: activeTab === 'overview' }"
              @click="switchTab('overview')">Overview</button>
            <button class="overlay-tab-btn" :class="{ active: activeTab === 'resume' }"
              @click="switchTab('resume')">Resume<span x-show="selectedJob.resume_md_exists || !!selectedJob.resume_path" class="tab-check">✓</span></button>
            <button class="overlay-tab-btn" :class="{ active: activeTab === 'cover' }"
              @click="switchTab('cover')">Cover Letter<span x-show="selectedJob.cover_md_exists || !!selectedJob.cover_path" class="tab-check">✓</span></button>
            <button class="overlay-tab-btn" :class="{ active: activeTab === 'details' }"
              @click="switchTab('details')">Details<span x-show="selectedJob.extraction_json_exists" class="tab-check">✓</span></button>
          </div>

          <!-- Tab content area -->
          <div class="overlay-tab-content">

            <!-- Overview tab -->
            <div x-show="activeTab === 'overview'">
              <div class="overlay-description" x-html="formatDesc(selectedJob.description)"></div>
            </div>

            <!-- Resume tab -->
            <div x-show="activeTab === 'resume'">
              <p class="overlay-empty-state"
                x-show="!selectedJob.resume_md_exists && !selectedJob.resume_path">
                No resume generated yet. Use "Generate MD" to create one.
              </p>
              <div x-show="selectedJob.resume_md_exists || !!selectedJob.resume_path">
                <div class="view-toggle">
                  <button :class="{ active: resumeView === 'md' }" @click="resumeView = 'md'">MD</button>
                  <button :class="{ active: resumeView === 'pdf' }" @click="resumeView = 'pdf'"
                    :disabled="!selectedJob.resume_path">PDF</button>
                </div>
                <div x-show="resumeView === 'md'">
                  <p class="overlay-empty-state" x-show="!resumeMarkdown">Loading…</p>
                  <pre class="overlay-md-viewer" x-show="resumeMarkdown" x-text="resumeMarkdown"></pre>
                </div>
                <template x-if="resumeView === 'pdf' && !!selectedJob.resume_path">
                  <iframe class="overlay-pdf-frame"
                    :src="`/api/jobs/${encodeURIComponent(selectedJob.job_key)}/resume`">
                  </iframe>
                </template>
              </div>
            </div>

            <!-- Cover Letter tab -->
            <div x-show="activeTab === 'cover'">
              <p class="overlay-empty-state"
                x-show="!selectedJob.cover_md_exists && !selectedJob.cover_path">
                No cover letter generated yet. Use "Generate MD" to create one.
              </p>
              <div x-show="selectedJob.cover_md_exists || !!selectedJob.cover_path">
                <div class="view-toggle">
                  <button :class="{ active: coverView === 'md' }" @click="coverView = 'md'">MD</button>
                  <button :class="{ active: coverView === 'pdf' }" @click="coverView = 'pdf'"
                    :disabled="!selectedJob.cover_path">PDF</button>
                </div>
                <div x-show="coverView === 'md'">
                  <p class="overlay-empty-state" x-show="!coverMarkdown">Loading…</p>
                  <pre class="overlay-md-viewer" x-show="coverMarkdown" x-text="coverMarkdown"></pre>
                </div>
                <template x-if="coverView === 'pdf' && !!selectedJob.cover_path">
                  <iframe class="overlay-pdf-frame"
                    :src="`/api/jobs/${encodeURIComponent(selectedJob.job_key)}/cover`">
                  </iframe>
                </template>
              </div>
            </div>

            <!-- Details tab -->
            <div x-show="activeTab === 'details'" style="height:100%">
              <p class="overlay-empty-state"
                x-show="!selectedJob.extraction_json_exists">
                No extraction yet. Configure a Description Extraction Prompt in Config, then click Extract.
              </p>
              <div x-show="selectedJob.extraction_json_exists">
                <div class="view-toggle">
                  <button :class="{ active: extractionView === 'rendered' }" @click="extractionView = 'rendered'">Rendered</button>
                  <button :class="{ active: extractionView === 'json' }" @click="extractionView = 'json'">JSON</button>
                </div>
                <template x-if="selectedJob.extraction_json_exists">
                  <iframe class="overlay-pdf-frame"
                    :src="`/api/jobs/${encodeURIComponent(selectedJob.job_key)}/description?view=${extractionView}`">
                  </iframe>
                </template>
              </div>
            </div>

          </div><!-- end overlay-tab-content -->
        </div><!-- end overlay-body -->

        <!-- Prompt overlay (absolute within panel) -->
        <div class="prompt-overlay" x-show="promptOverlay !== null" @click.self="promptOverlay = null">
          <div class="prompt-overlay-panel">
            <div class="prompt-overlay-header">
              <strong x-text="promptOverlay ? (promptOverlay.type === 'resume' ? 'Resume Prompt' : promptOverlay.type === 'cover' ? 'Cover Letter Prompt' : 'Description Extraction Prompt') : ''"></strong>
              <button class="btn" @click="promptOverlay = null">Close</button>
            </div>
            <pre x-text="promptOverlay ? promptOverlay.text : ''"></pre>
          </div>
        </div>

      </div>
    </template>
  </div>
</div>

<script>
function dashboard() {
  return {
    jobs: [],
    selectedJob: null,
    sortField: 'scraped_at',
    sortDir: 'desc',
    deleteConfirm: false,
    loadError: null,
    generating: null,
    activeTab: 'overview',
    resumeView: 'md',
    coverView: 'md',
    resumeMarkdown: null,
    coverMarkdown: null,
    promptOverlay: null,
    extractionHasPrompt: false,
    resumeHasTemplate: false,
    coverHasTemplate: false,
    extractionView: 'rendered',

    async init() {
      await this.loadJobs();
      try {
        const r = await fetch('/api/config/prompts/active-status');
        if (r.ok) {
          const s = await r.json();
          this.resumeHasTemplate = s.resume_has_template;
          this.coverHasTemplate = s.cover_has_template;
          this.extractionHasPrompt = s.description_has_prompt;
        }
      } catch { /* leave as false */ }
      document.addEventListener('click', (e) => {
        if (this.deleteConfirm && !e.target.closest('.action-bar')) {
          this.deleteConfirm = false;
        }
      });
    },

    async loadJobs() {
      try {
        const resp = await fetch('/api/jobs');
        if (!resp.ok) throw new Error('Server error');
        this.jobs = await resp.json();
      } catch {
        this.loadError = 'Failed to load jobs. Is the server running?';
      }
    },

    get sortedJobs() {
      return [...this.jobs].sort((a, b) => {
        let av = a[this.sortField];
        let bv = b[this.sortField];

        if (this.sortField === 'salary') {
          av = parseFloat(String(av || '').replace(/[^0-9.]/g, '')) || 0;
          bv = parseFloat(String(bv || '').replace(/[^0-9.]/g, '')) || 0;
        }

        const nullLast = this.sortDir === 'asc' ? Infinity : -Infinity;
        if (av == null) av = nullLast;
        if (bv == null) bv = nullLast;

        if (av < bv) return this.sortDir === 'asc' ? -1 : 1;
        if (av > bv) return this.sortDir === 'asc' ? 1 : -1;
        return 0;
      });
    },

    setSort(field) {
      if (this.sortField === field) {
        this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortField = field;
        this.sortDir = field === 'state' ? 'asc' : 'desc';
      }
    },

    async selectJob(job) {
      this.selectedJob = { ...job };
      this.deleteConfirm = false;
      this.activeTab = 'overview';
      this.resumeView = 'md';
      this.coverView = 'md';
      this.resumeMarkdown = null;
      this.coverMarkdown = null;
      this.promptOverlay = null;
      this.extractionView = 'rendered';
      try {
        const r = await fetch('/api/config/prompts/active-status');
        if (r.ok) {
          const s = await r.json();
          this.resumeHasTemplate = s.resume_has_template;
          this.coverHasTemplate = s.cover_has_template;
          this.extractionHasPrompt = s.description_has_prompt;
        }
      } catch { /* leave existing values */ }
    },

    closeOverlay() {
      this.selectedJob = null;
      this.deleteConfirm = false;
      this.activeTab = 'overview';
      this.resumeView = 'md';
      this.coverView = 'md';
      this.resumeMarkdown = null;
      this.coverMarkdown = null;
      this.promptOverlay = null;
      this.extractionView = 'rendered';
      this.generating = null;
    },

    async switchTab(tab) {
      this.promptOverlay = null;
      this.activeTab = tab;
      if (tab === 'resume') {
        this.resumeView = 'md';
        if (this.selectedJob.resume_md_exists && this.resumeMarkdown === null) {
          this.fetchResumeMarkdown();
        }
      } else if (tab === 'cover') {
        this.coverView = 'md';
        if (this.selectedJob.cover_md_exists && this.coverMarkdown === null) {
          this.fetchCoverMarkdown();
        }
      }
    },

    get generatingLabel() {
      const map = {
        resume_md: 'Generating resume…',
        resume_pdf: 'Rendering resume PDF…',
        cover_md: 'Generating cover letter…',
        cover_pdf: 'Rendering cover PDF…',
        description_extract: 'Extracting insights…',
      };
      return this.generating ? (map[this.generating] || 'Working…') : '';
    },

    scoreClass(s) {
      if (s == null) return 'score-none';
      if (s >= 0.8) return 'score-green';
      if (s >= 0.5) return 'score-amber';
      return 'score-red';
    },

    statusLabel(state) {
      const labels = { draft: 'Draft', applied: 'Applied', in_contact: 'In Contact', rejected: 'Rejected' };
      return labels[state] || state;
    },
    statusClass(state) {
      const map = {
        draft: 'status-draft',
        applied: 'status-applied',
        in_contact: 'status-in-contact',
        rejected: 'status-rejected',
      };
      return map[state] || 'status-draft';
    },

    pct(v) {
      return v != null ? Math.round(v * 100) + '%' : '—';
    },

    timeAgo(iso) {
      if (!iso) return '—';
      const secs = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (secs < 60) return 'a few seconds ago';
      const mins = Math.floor(secs / 60);
      if (mins < 60) return mins + ' min ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + ' hr ago';
      const d = new Date(iso);
      return String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');
    },

    formatDesc(desc) {
      if (!desc) return '<em>No description available.</em>';
      return String(desc)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    },

    _updateJob(updated) {
      const idx = this.jobs.findIndex(j => j.job_key === updated.job_key);
      if (idx !== -1) this.jobs[idx] = updated;
      this.selectedJob = { ...updated };
    },

    async _post(url) {
      const resp = await fetch(url, { method: 'POST' });
      if (!resp.ok) throw new Error(await resp.text());
      return resp.json();
    },

    async fetchResumeMarkdown() {
      const key = this.selectedJob?.job_key;
      if (!key) return;
      try {
        const resp = await fetch(`/api/jobs/${encodeURIComponent(key)}/resume/markdown`);
        if (!resp.ok) { this.resumeMarkdown = '(Failed to load)'; return; }
        if (this.selectedJob?.job_key !== key) return;
        this.resumeMarkdown = await resp.text();
      } catch { this.resumeMarkdown = '(Failed to load)'; }
    },

    async fetchCoverMarkdown() {
      const key = this.selectedJob?.job_key;
      if (!key) return;
      try {
        const resp = await fetch(`/api/jobs/${encodeURIComponent(key)}/cover/markdown`);
        if (!resp.ok) { this.coverMarkdown = '(Failed to load)'; return; }
        if (this.selectedJob?.job_key !== key) return;
        this.coverMarkdown = await resp.text();
      } catch { this.coverMarkdown = '(Failed to load)'; }
    },

    async viewPrompt(type) {
      const key = this.selectedJob?.job_key;
      if (!key) return;
      const url = `/api/jobs/${encodeURIComponent(key)}/${encodeURIComponent(type)}/prompt`;
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error();
        if (this.selectedJob?.job_key !== key) return;
        this.promptOverlay = { type, text: await resp.text() };
      } catch { alert('Failed to load prompt.'); }
    },

    async extractDescription() {
      const key = this.selectedJob.job_key;
      this.generating = 'description_extract';
      try {
        const resp = await fetch(`/api/jobs/${encodeURIComponent(key)}/description/extract`, { method: 'POST' });
        if (!resp.ok) throw new Error('Extraction failed');
        const updated = await resp.json();
        Object.assign(this.selectedJob, updated);
      } catch {
        alert('Description extraction failed. Please try again.');
      } finally {
        this.generating = null;
      }
    },

    async calculateScore() {
      try {
        this._updateJob(await this._post(`/api/jobs/${encodeURIComponent(this.selectedJob.job_key)}/score`));
      } catch { alert('Failed to calculate score.'); }
    },

    async generateResumeMd() {
      this.generating = 'resume_md';
      try {
        this._updateJob(await this._post(`/api/jobs/${encodeURIComponent(this.selectedJob.job_key)}/generate/resume/md`));
        this.resumeMarkdown = null;
        if (this.activeTab === 'resume') await this.fetchResumeMarkdown();
      } catch { alert('Failed to generate resume markdown.'); }
      finally { this.generating = null; }
    },

    async generateResumePdf() {
      this.generating = 'resume_pdf';
      try {
        this._updateJob(await this._post(`/api/jobs/${encodeURIComponent(this.selectedJob.job_key)}/generate/resume/pdf`));
      } catch { alert('Failed to render resume PDF.'); }
      finally { this.generating = null; }
    },

    async generateCoverMd() {
      this.generating = 'cover_md';
      try {
        this._updateJob(await this._post(`/api/jobs/${encodeURIComponent(this.selectedJob.job_key)}/generate/cover/md`));
        this.coverMarkdown = null;
        if (this.activeTab === 'cover') await this.fetchCoverMarkdown();
      } catch { alert('Failed to generate cover letter markdown.'); }
      finally { this.generating = null; }
    },

    async generateCoverPdf() {
      this.generating = 'cover_pdf';
      try {
        this._updateJob(await this._post(`/api/jobs/${encodeURIComponent(this.selectedJob.job_key)}/generate/cover/pdf`));
      } catch { alert('Failed to render cover letter PDF.'); }
      finally { this.generating = null; }
    },

    async setStatus(state) {
      try {
        const resp = await fetch(`/api/jobs/${encodeURIComponent(this.selectedJob.job_key)}/state`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ state }),
        });
        if (!resp.ok) throw new Error();
        this._updateJob(await resp.json());
      } catch { alert('Failed to update status.'); }
    },

    async deleteJob() {
      const key = this.selectedJob.job_key;
      try {
        const resp = await fetch(`/api/jobs/${encodeURIComponent(key)}`, { method: 'DELETE' });
        if (!resp.ok) throw new Error();
        this.jobs = this.jobs.filter(j => j.job_key !== key);
        this.closeOverlay();
      } catch { alert('Failed to delete job.'); }
    },
  };
}
</script>

</body>
</html>
