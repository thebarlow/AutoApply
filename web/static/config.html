<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Apply — Config</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<nav>
  <a class="brand" href="/">Auto Apply</a>
  <a href="/">Dashboard</a>
  <a href="/config" class="active">Config</a>
  <a href="/setup">Setup</a>
  <a href="/help" class="nav-right">Help</a>
</nav>

<div class="config-shell">

  <nav class="config-sidebar">
    <div class="config-sidebar-label">Config</div>
    <button class="config-tab-btn active" data-tab="profile">User Profile</button>
    <button class="config-tab-btn" data-tab="scaffolding">Scaffolding</button>
    <button class="config-tab-btn" data-tab="api">API</button>
  </nav>

  <div class="config-content">

    <!-- Pane: User Profile (populated in Task 6) -->
    <div class="config-pane active" id="pane-profile">
      <div class="config-pane-title">User Profiles</div>
    </div>

    <!-- Pane: Scaffolding (populated in Task 7–8) -->
    <div class="config-pane" id="pane-scaffolding">
      <div class="config-pane-title">Scaffolding</div>
    </div>

    <!-- Pane: API -->
    <div class="config-pane" id="pane-api">
      <div class="config-pane-title">API Config</div>

      <div class="config-subsection">
        <div class="config-subsection-title">Sources</div>
        <div class="config-api-checkbox-group">
          <label><input type="checkbox" id="src-remotive"> Remotive</label>
          <label><input type="checkbox" id="src-remoteok"> RemoteOK</label>
        </div>
      </div>

      <div class="config-subsection">
        <div class="config-subsection-title">Search</div>
        <div class="config-form-group">
          <label class="config-form-label">Keywords whitelist (comma-separated)</label>
          <input class="config-form-input" type="text" id="search-whitelist" placeholder="Python, FastAPI, Data Engineer">
        </div>
        <div class="config-form-group">
          <label class="config-form-label">Keywords blacklist (comma-separated)</label>
          <input class="config-form-input" type="text" id="search-blacklist" placeholder="Senior, Lead, Manager">
        </div>
        <div class="config-form-group">
          <label class="config-form-label">Max jobs per source</label>
          <input class="config-form-input" type="number" id="search-max-jobs" min="1" max="500" value="50" style="width:120px">
        </div>
        <button class="config-btn-save" id="save-api">Save</button>
        <span class="save-status" id="status-api" style="margin-left:12px;font-size:12px"></span>
      </div>
    </div>

  </div><!-- /config-content -->
</div><!-- /config-shell -->

<script>
(function () {

  // ---- Utility ----

  function showStatus(id, text, isError) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.style.color = isError ? '#dc2626' : '#16a34a';
    setTimeout(() => { el.textContent = ''; }, 3000);
  }

  function toList(val) {
    return val.split(',').map(s => s.trim()).filter(Boolean);
  }

  // ---- Tab switching ----

  document.querySelectorAll('.config-tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.config-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.config-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('pane-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ---- API tab ----

  async function loadApiConfig() {
    const [src, search] = await Promise.all([
      fetch('/api/config/sources').then(r => r.json()),
      fetch('/api/config/search').then(r => r.json()),
    ]);
    document.getElementById('src-remotive').checked = src.remotive;
    document.getElementById('src-remoteok').checked = src.remoteok;
    document.getElementById('search-whitelist').value = search.keywords_whitelist.join(', ');
    document.getElementById('search-blacklist').value = search.keywords_blacklist.join(', ');
    document.getElementById('search-max-jobs').value = search.max_jobs_per_source;
  }

  document.getElementById('save-api').addEventListener('click', async function () {
    try {
      const [r1, r2] = await Promise.all([
        fetch('/api/config/sources', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            remotive: document.getElementById('src-remotive').checked,
            remoteok: document.getElementById('src-remoteok').checked,
          }),
        }),
        fetch('/api/config/search', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            keywords_whitelist: toList(document.getElementById('search-whitelist').value),
            keywords_blacklist: toList(document.getElementById('search-blacklist').value),
            max_jobs_per_source: parseInt(document.getElementById('search-max-jobs').value) || 50,
          }),
        }),
      ]);
      if (r1.ok && r2.ok) showStatus('status-api', 'Saved ✓', false);
      else showStatus('status-api', 'Error saving', true);
    } catch { showStatus('status-api', 'Error saving', true); }
  });

  // ---- Init ----
  loadApiConfig().catch(console.error);

})();
</script>

</body>
</html>
