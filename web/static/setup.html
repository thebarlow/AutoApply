<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Apply — Setup</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<nav>
  <a class="brand" href="/">Auto Apply</a>
  <a href="/">Dashboard</a>
  <a href="/config">Config</a>
  <a href="/setup" class="nav-active">Setup</a>
</nav>

<main>
  <h1>Setup</h1>

  <div class="setup-steps">

    <!-- Step: Your Information -->
    <div class="setup-step" id="step-your-info">
      <div class="setup-step-header">
        <span class="traffic-light" id="tl-your-info">🔴</span>
        <h2>Your Information</h2>
      </div>
      <div class="setup-step-body">
        <div class="setup-field-row">
          <span class="setup-icon">🐙</span>
          <label class="setup-field-label">GitHub</label>
          <input class="setup-field-input" type="text" id="setup-github" placeholder="github.com/username">
        </div>
        <div class="setup-field-row">
          <span class="setup-icon">💼</span>
          <label class="setup-field-label">LinkedIn</label>
          <input class="setup-field-input" type="text" id="setup-linkedin" placeholder="linkedin.com/in/username">
        </div>
        <div class="setup-field-row">
          <span class="setup-icon">🌐</span>
          <label class="setup-field-label">Portfolio Website</label>
          <input class="setup-field-input" type="text" id="setup-website" placeholder="yoursite.com">
        </div>
        <span class="save-status" id="status-your-info"></span>
      </div>
    </div>

    <!-- Step: Profiles -->
    <div class="setup-step" id="step-profiles">
      <div class="setup-step-header">
        <span class="traffic-light" id="tl-profiles">🔴</span>
        <h2>Profiles</h2>
      </div>
      <div class="setup-step-body" style="padding:0">
        <table class="setup-data-table">
          <colgroup>
            <col style="width:18%">
            <col style="width:13%">
            <col style="width:8%">
            <col style="width:13%">
            <col style="width:8%">
            <col>
            <col style="width:32px">
          </colgroup>
          <thead>
            <tr>
              <th>Profile Name</th>
              <th>Resume</th>
              <th>Resume<br>Date</th>
              <th>Cover Letter</th>
              <th>Cover<br>Date</th>
              <th></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="setup-profile-list"></tbody>
        </table>
        <button class="setup-add-row-btn" id="btn-add-profile">+ Add Profile</button>
        <span class="save-status" id="status-setup-profiles" style="font-size:12px;display:block;padding:0.3rem 0.75rem 0.5rem"></span>
      </div>
    </div>

    <!-- Step: Job Searches -->
    <div class="setup-step" id="step-searches">
      <div class="setup-step-header">
        <span class="traffic-light" id="tl-searches">🔴</span>
        <h2>Job Searches</h2>
      </div>
      <div class="setup-step-body" style="padding:0">
        <table class="setup-data-table">
          <colgroup>
            <col style="width:30px">
            <col style="width:150px">
            <col>
            <col style="width:32px">
          </colgroup>
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Description</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="setup-search-list"></tbody>
        </table>
        <button class="setup-add-row-btn" id="btn-add-search">+ Add Search</button>
        <span class="save-status" id="status-searches" style="font-size:12px;display:block;padding:0.3rem 0.75rem 0.5rem"></span>
      </div>
    </div>

  </div>
</main>

<script>
(function () {

  function showStatus(id, text, isError) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.style.color = isError ? '#e74c3c' : '#27ae60';
    setTimeout(function() { el.textContent = ''; }, 2500);
  }

  function trafficLight(filled, total) {
    if (filled === total) return '🟢';
    if (filled > 0) return '🟡';
    return '🔴';
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' }); }
    catch { return ''; }
  }

  // ---- Your Information ----

  function updateYourInfoLight() {
    var vals = [
      document.getElementById('setup-github').value.trim(),
      document.getElementById('setup-linkedin').value.trim(),
      document.getElementById('setup-website').value.trim(),
    ];
    document.getElementById('tl-your-info').textContent = trafficLight(vals.filter(Boolean).length, 3);
  }

  async function saveYourInfoSafe() {
    try {
      var data = await fetch('/api/config/templates').then(function(r) { return r.json(); });
      var github = document.getElementById('setup-github').value.trim();
      var linkedin = document.getElementById('setup-linkedin').value.trim();
      var website = document.getElementById('setup-website').value.trim();
      await fetch('/api/config/templates', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          resume_template_path: data.resume_template_path || '',
          cover_template_path: data.cover_template_path || '',
          resume_prompt_template: data.resume_prompt_template || '',
          cover_prompt_template: data.cover_prompt_template || '',
          github: github, linkedin: linkedin, website: website,
        }),
      });
      updateYourInfoLight();
    } catch { showStatus('status-your-info', 'Error saving', true); }
  }

  async function loadYourInfo() {
    try {
      var data = await fetch('/api/config/templates').then(function(r) { return r.json(); });
      document.getElementById('setup-github').value = data.github || '';
      document.getElementById('setup-linkedin').value = data.linkedin || '';
      document.getElementById('setup-website').value = data.website || '';
      updateYourInfoLight();
    } catch { showStatus('status-your-info', 'Failed to load', true); }
  }

  ['setup-github', 'setup-linkedin', 'setup-website'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('input', updateYourInfoLight);
    el.addEventListener('blur', saveYourInfoSafe);
  });

  // ---- Profiles ----

  // A row is "valid" if it has been saved to DB and has at least one file.
  function rowHasFile(tr) {
    return tr.dataset.hasFile === 'true';
  }

  function updateProfilesLight() {
    var valid = Array.from(document.querySelectorAll('#setup-profile-list tr')).filter(rowHasFile);
    document.getElementById('tl-profiles').textContent = valid.length > 0 ? '🟢' : '🔴';
  }

  async function ensureProfileRow(tr) {
    if (tr.dataset.id) return tr.dataset.id;
    var name = tr.querySelector('.setup-row-name').value.trim() || 'Default Profile';
    var resp = await fetch('/api/config/profiles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name }),
    });
    if (!resp.ok) throw new Error('Failed to create profile');
    var p = await resp.json();
    tr.dataset.id = String(p.id);
    updateProfilesLight();
    return String(p.id);
  }

  async function mergeAndSaveProfile(profileId, updates) {
    var resp = await fetch('/api/config/profiles/' + profileId);
    if (!resp.ok) return;
    var profile = await resp.json();
    var data = Object.assign({}, profile.data || {}, updates.data || {});
    var name = updates.name !== undefined ? updates.name : profile.name;
    await fetch('/api/config/profiles/' + profileId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, data: data }),
    });
  }

  function buildProfileRow(p) {
    p = p || {};
    var tr = document.createElement('tr');
    tr.dataset.id = p.id ? String(p.id) : '';
    tr.dataset.hasFile = String(!!(p.resume_path || p.cover_letter_path));

    var resumeName = (p.resume_path || '').split('/').pop();
    var coverName = (p.cover_letter_path || '').split('/').pop();
    var hasResume = !!(p.resume_path);

    tr.innerHTML = [
      '<td><input class="setup-row-input setup-row-name" type="text" placeholder="Default Profile" value="' + escHtml(p.name || '') + '"></td>',
      '<td><span class="setup-row-filename' + (resumeName ? '' : ' setup-row-filename--empty') + '">' + escHtml(resumeName || 'No file') + '</span></td>',
      '<td><span class="setup-row-filedate">' + escHtml(fmtDate(p.resume_uploaded_at)) + '</span></td>',
      '<td><span class="setup-row-filename' + (coverName ? '' : ' setup-row-filename--empty') + '">' + escHtml(coverName || 'No file') + '</span></td>',
      '<td><span class="setup-row-filedate">' + escHtml(fmtDate(p.cover_uploaded_at)) + '</span></td>',
      '<td class="setup-row-actions-cell">',
        '<label class="setup-row-btn">Upload Resume<input type="file" class="setup-resume-input" accept=".pdf,.md" style="display:none"></label>',
        '<label class="setup-row-btn">Upload Cover Letter<input type="file" class="setup-cover-input" accept=".pdf" style="display:none"></label>',
        '<button class="setup-row-btn setup-parse-btn" type="button"' + (hasResume ? '' : ' disabled') + '>Parse</button>',
      '</td>',
      '<td class="setup-row-del-cell"><button class="setup-row-del" type="button" title="Delete row">✕</button></td>',
    ].join('');

    var nameInput   = tr.querySelector('.setup-row-name');
    var resumeInput = tr.querySelector('.setup-resume-input');
    var coverInput  = tr.querySelector('.setup-cover-input');
    var parseBtn    = tr.querySelector('.setup-parse-btn');
    var tds         = tr.querySelectorAll('td');

    nameInput.addEventListener('blur', async function() {
      var name = nameInput.value.trim();
      if (!name) return;
      try {
        var id = await ensureProfileRow(tr);
        await mergeAndSaveProfile(id, { name: name });
      } catch { showStatus('status-setup-profiles', 'Save failed', true); }
    });

    resumeInput.addEventListener('change', async function() {
      var file = resumeInput.files[0];
      if (!file) return;
      try {
        var id = await ensureProfileRow(tr);
        var form = new FormData();
        form.append('file', file);
        var up = await fetch('/api/config/profile/upload', { method: 'POST', body: form });
        if (!up.ok) { showStatus('status-setup-profiles', 'Upload failed', true); return; }
        var result = await up.json();
        var filePath = result.path;
        var today = new Date().toISOString();
        var isPdf = file.name.toLowerCase().endsWith('.pdf');
        await mergeAndSaveProfile(id, {
          data: { resume_path: isPdf ? filePath : '', md_path: isPdf ? '' : filePath, resume_uploaded_at: today },
        });
        tds[1].querySelector('.setup-row-filename').textContent = filePath.split('/').pop();
        tds[1].querySelector('.setup-row-filename').classList.remove('setup-row-filename--empty');
        tds[2].querySelector('.setup-row-filedate').textContent = fmtDate(today);
        parseBtn.disabled = false;
        tr.dataset.hasFile = 'true';
        updateProfilesLight();
      } catch { showStatus('status-setup-profiles', 'Upload failed', true); }
    });

    coverInput.addEventListener('change', async function() {
      var file = coverInput.files[0];
      if (!file) return;
      try {
        var id = await ensureProfileRow(tr);
        var form = new FormData();
        form.append('file', file);
        var up = await fetch('/api/config/profile/upload', { method: 'POST', body: form });
        if (!up.ok) { showStatus('status-setup-profiles', 'Upload failed', true); return; }
        var result = await up.json();
        var filePath = result.path;
        var today = new Date().toISOString();
        await mergeAndSaveProfile(id, { data: { cover_letter_path: filePath, cover_uploaded_at: today } });
        tds[3].querySelector('.setup-row-filename').textContent = filePath.split('/').pop();
        tds[3].querySelector('.setup-row-filename').classList.remove('setup-row-filename--empty');
        tds[4].querySelector('.setup-row-filedate').textContent = fmtDate(today);
        tr.dataset.hasFile = 'true';
        updateProfilesLight();
      } catch { showStatus('status-setup-profiles', 'Upload failed', true); }
    });

    parseBtn.addEventListener('click', async function() {
      var id = tr.dataset.id;
      if (!id) return;
      parseBtn.disabled = true;
      parseBtn.textContent = 'Parsing…';
      try {
        var resp = await fetch('/api/config/profiles/' + id + '/parse', { method: 'POST' });
        if (!resp.ok) {
          var err = await resp.json().catch(function() { return null; });
          showStatus('status-setup-profiles', 'Parse failed' + (err && err.detail ? ': ' + err.detail : ''), true);
          return;
        }
        var result = await resp.json();
        if (result.name) nameInput.value = result.name;
        showStatus('status-setup-profiles', 'Parsed ✓', false);
      } catch { showStatus('status-setup-profiles', 'Parse error', true); }
      finally { parseBtn.disabled = false; parseBtn.textContent = 'Parse'; }
    });

    tr.querySelector('.setup-row-del').addEventListener('click', async function() {
      var id = tr.dataset.id;
      if (id) await fetch('/api/config/profiles/' + id, { method: 'DELETE' });
      tr.remove();
      updateProfilesLight();
    });

    return tr;
  }

  document.getElementById('btn-add-profile').addEventListener('click', function() {
    var rows = document.querySelectorAll('#setup-profile-list tr');
    if (rows.length > 0) {
      var last = rows[rows.length - 1];
      if (!rowHasFile(last)) {
        showStatus('status-setup-profiles', 'Upload a resume or cover letter to the current row first', true);
        last.querySelector('.setup-row-name').focus();
        return;
      }
    }
    var newRow = buildProfileRow({});
    document.getElementById('setup-profile-list').appendChild(newRow);
    newRow.querySelector('.setup-row-name').focus();
  });

  async function loadSetupProfiles() {
    try {
      var meta = await fetch('/api/config/profiles').then(function(r) { return r.json(); });
      var tbody = document.getElementById('setup-profile-list');
      tbody.innerHTML = '';
      var profiles = (meta.profiles && meta.profiles.length > 0) ? meta.profiles : [{}];
      profiles.forEach(function(p) { tbody.appendChild(buildProfileRow(p)); });
      updateProfilesLight();
    } catch { showStatus('status-setup-profiles', 'Failed to load profiles', true); }
  }

  // ---- Job Searches ----

  var _searchSaveTimer = null;

  function updateSearchesLight() {
    var rows = document.querySelectorAll('#setup-search-list tr');
    var hasContent = Array.from(rows).some(function(r) {
      var desc = r.querySelector('.setup-search-desc');
      return desc && desc.value.trim();
    });
    document.getElementById('tl-searches').textContent = hasContent ? '🟢' : '🔴';
  }

  function renumberSearches() {
    document.querySelectorAll('#setup-search-list tr').forEach(function(tr, i) {
      var el = tr.querySelector('.setup-row-num');
      if (el) el.textContent = i + 1;
    });
  }

  function collectSearches() {
    return Array.from(document.querySelectorAll('#setup-search-list tr')).map(function(tr) {
      return {
        id: tr.dataset.id,
        title: (tr.querySelector('.setup-search-name') || { value: '' }).value,
        description: (tr.querySelector('.setup-search-desc') || { value: '' }).value,
      };
    });
  }

  async function saveJobSearches() {
    try {
      await fetch('/api/config/job_searches', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ searches: collectSearches() }),
      });
    } catch {}
  }

  function scheduleSave() {
    clearTimeout(_searchSaveTimer);
    _searchSaveTimer = setTimeout(saveJobSearches, 600);
  }

  function buildSearchRow(search, index) {
    search = search || {};
    var tr = document.createElement('tr');
    tr.dataset.id = search.id || ('s-' + Date.now() + '-' + Math.random().toString(36).slice(2));

    tr.innerHTML = [
      '<td class="setup-row-num-cell"><span class="setup-row-num">' + (index + 1) + '</span></td>',
      '<td><input class="setup-row-input setup-search-name" type="text" placeholder="Name" value="' + escHtml(search.title || '') + '"></td>',
      '<td><input class="setup-row-input setup-search-desc" type="text" placeholder="Describe the type of job you are looking for" value="' + escHtml(search.description || '') + '"></td>',
      '<td class="setup-row-del-cell"><button class="setup-row-del" type="button" title="Delete row">✕</button></td>',
    ].join('');

    tr.querySelector('.setup-search-name').addEventListener('input', function() { scheduleSave(); });
    tr.querySelector('.setup-search-name').addEventListener('blur', saveJobSearches);
    tr.querySelector('.setup-search-desc').addEventListener('input', function() { updateSearchesLight(); scheduleSave(); });
    tr.querySelector('.setup-search-desc').addEventListener('blur', saveJobSearches);

    tr.querySelector('.setup-row-del').addEventListener('click', async function() {
      tr.remove();
      renumberSearches();
      updateSearchesLight();
      await saveJobSearches();
    });

    return tr;
  }

  document.getElementById('btn-add-search').addEventListener('click', async function() {
    var rows = document.querySelectorAll('#setup-search-list tr');
    if (rows.length > 0) {
      var last = rows[rows.length - 1];
      var desc = last.querySelector('.setup-search-desc');
      if (!desc || !desc.value.trim()) {
        showStatus('status-searches', 'Fill in the current row first', true);
        desc && desc.focus();
        return;
      }
    }
    var count = document.querySelectorAll('#setup-search-list tr').length;
    var newRow = buildSearchRow({ id: 's-' + Date.now() }, count);
    document.getElementById('setup-search-list').appendChild(newRow);
    newRow.querySelector('.setup-search-name').focus();
    await saveJobSearches();
  });

  async function loadJobSearches() {
    try {
      var data = await fetch('/api/config/job_searches').then(function(r) { return r.json(); });
      var tbody = document.getElementById('setup-search-list');
      tbody.innerHTML = '';
      var searches = (data.searches && data.searches.length > 0)
        ? data.searches
        : [{ id: 's-default', title: '', description: '' }];
      searches.forEach(function(s, i) { tbody.appendChild(buildSearchRow(s, i)); });
      updateSearchesLight();
    } catch { showStatus('status-searches', 'Failed to load searches', true); }
  }

  // ---- Init ----
  loadYourInfo();
  loadSetupProfiles();
  loadJobSearches();

})();
</script>

</body>
</html>
