<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 12px;
    }
    #btn-download {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
      background: #1a57d6;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
    #btn-download:disabled {
      background: #888;
      cursor: default;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #444;
      min-height: 32px;
      line-height: 1.5;
    }
    #status.error { color: #c0392b; }
    #status.done  { color: #27ae60; }
    #link-options {
      display: block;
      margin-top: 14px;
      font-size: 11px;
      color: #888;
      text-align: right;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>Indeed Saved Jobs</h2>
  <button id="btn-download">Download Jobs</button>
  <div id="status">Navigate to myjobs.indeed.com first.</div>
  <a id="link-options">Settings</a>
  <script src="popup.js"></script>
</body>
</html>
